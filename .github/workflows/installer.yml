name: installer

# Builds the native COM add-in (EmailNotesAddin.dll) and compiles the styled
# Windows installer (EmailNotesSetup.exe) on a real Windows runner.
#
# A GitHub Release with the installer attached is created by:
#   * pushing a version tag (e.g. v0.2.0), or
#   * running this workflow manually (Actions -> installer -> "Run workflow"),
#     which lets the workflow's own token create the tag + release.

on:
  push:
    branches: ['**']
    tags: ['v*']
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create/update a GitHub Release with the installer'
        type: boolean
        default: true
      version:
        description: 'Release tag, e.g. v0.2.1 (blank = version from package.json)'
        type: string
        default: ''
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build native add-in
        run: dotnet build native/EmailNotesAddin.csproj -c Release -v minimal

      - name: Compile installer
        shell: pwsh
        run: |
          # Inno Setup is preinstalled on windows-latest; find ISCC.exe robustly.
          $candidates = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          )
          $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) { $iscc = (Get-Command ISCC.exe -ErrorAction SilentlyContinue).Source }
          if (-not $iscc) { throw "ISCC.exe (Inno Setup) not found on the runner." }
          Write-Host "Using $iscc"
          & $iscc installer\EmailNotes.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }

      - uses: actions/upload-artifact@v4
        with:
          name: EmailNotesSetup
          path: installer/Output/EmailNotesSetup.exe
          if-no-files-found: error

      - name: Resolve release tag
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($v)) {
            if ("${{ github.ref_type }}" -eq "tag") {
              $v = "${{ github.ref_name }}"
            } else {
              $pkg = Get-Content package.json -Raw | ConvertFrom-Json
              $v = "v$($pkg.version)"
            }
          }
          "tag=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Release tag: $v"

      - name: Publish release with installer
        if: >-
          github.event_name == 'release' ||
          github.ref_type == 'tag' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Email Notes ${{ steps.ver.outputs.tag }}
          target_commitish: ${{ github.sha }}
          prerelease: false
          make_latest: true
          files: installer/Output/EmailNotesSetup.exe
          body: |
            **Email Notes for Outlook** — a private notepad docked next to each mail.
            This is the **native** add-in: it runs fully locally, with **no Microsoft
            login and no internet**, and installs per-user (no admin).

            ### Install
            1. **Close Outlook.**
            2. Download **EmailNotesSetup.exe** below and run it. Windows SmartScreen
               may warn about an unknown publisher — choose **More info → Run anyway**
               (the installer is not code-signed).
            3. Start Outlook, open a mail, and click **Notes** in the **Email Notes**
               group on the Home ribbon. The notepad docks on the right.

            Notes and screenshots stay on your device under `%APPDATA%\EmailNotes`.
            See the [README](https://github.com/Pixelschmied/Outlook-Notes#readme).
