name: installer

# Compiles the styled Windows installer (EmailNotesSetup.exe) on a real Windows
# runner. Every push uploads it as a build artifact.
#
# A GitHub Release with the installer attached is created either by:
#   * pushing a version tag (e.g. v0.1.0), or
#   * running this workflow manually (Actions -> installer -> "Run workflow"),
#     which lets the workflow's own token create the tag + release. This is what
#     allows the release to be cut without pushing a tag by hand.

on:
  push:
    branches: ['**']
    tags: ['v*']
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create/update a GitHub Release with the installer'
        type: boolean
        default: true
      version:
        description: 'Release tag, e.g. v0.1.1 (blank = version from package.json)'
        type: string
        default: ''
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: node scripts/make-installer-art.mjs
      - name: Stamp production manifest
        run: node scripts/build-manifest.mjs
        env:
          PUBLIC_URL: https://pixelschmied.github.io/Outlook-Notes

      - name: Compile installer
        shell: pwsh
        run: |
          # Inno Setup is preinstalled on windows-latest; find ISCC.exe robustly.
          $candidates = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe"
          )
          $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) { $iscc = (Get-Command ISCC.exe -ErrorAction SilentlyContinue).Source }
          if (-not $iscc) { throw "ISCC.exe (Inno Setup) not found on the runner." }
          Write-Host "Using $iscc"
          & $iscc installer\EmailNotes.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }

      - uses: actions/upload-artifact@v4
        with:
          name: EmailNotesSetup
          path: installer/Output/EmailNotesSetup.exe
          if-no-files-found: error

      # Work out the release tag: explicit input, else the pushed tag, else the
      # version from package.json (prefixed with "v").
      - name: Resolve release tag
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($v)) {
            if ("${{ github.ref_type }}" -eq "tag") {
              $v = "${{ github.ref_name }}"
            } else {
              $pkg = Get-Content package.json -Raw | ConvertFrom-Json
              $v = "v$($pkg.version)"
            }
          }
          "tag=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Release tag: $v"

      # Create/update the Release and attach the installer. On a manual run the
      # workflow's token creates the tag itself, so no hand-pushed tag is needed.
      - name: Publish release with installer
        if: >-
          github.event_name == 'release' ||
          github.ref_type == 'tag' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Email Notes ${{ steps.ver.outputs.tag }}
          target_commitish: ${{ github.sha }}
          prerelease: false
          make_latest: true
          files: installer/Output/EmailNotesSetup.exe
          body: |
            **Email Notes for Outlook** — a private notepad docked next to each mail.

            ### Install
            1. Download **EmailNotesSetup.exe** below.
            2. Run it (no admin needed). Windows SmartScreen may warn about an
               unknown publisher — choose **More info → Run anyway** (the installer
               is not code-signed).
            3. Restart Outlook, open a mail, click **Notes** on the ribbon, and pin
               the pane.

            Notes and screenshots stay on your device. See the
            [README](https://github.com/Pixelschmied/Outlook-Notes#readme) for details.
